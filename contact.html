<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bennett Goeke — Contact</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1 class="site-title">Bennett Goeke</h1>
    <nav>
      <button class="hamburger" aria-label="Menu">&#9776;</button>
      <div class="nav-links">
        <a href="index.html">Reel</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html" class="active">Contact</a>
      </div>
    </nav>
  </header>

  <main class="contact-wrapper">
    <div class="contact-layout">

      <!--
        Replace the div below with your actual photo:
        <img src="photo.jpg" alt="Bennett Goeke" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:4px;">
      -->
      <div class="contact-photo">Photo</div>

      <div class="contact-right">
        <h2>Connect &amp; Follow</h2>
        <div class="contact-box">

          <!--
            To make this form functional, sign up at https://formspree.io,
            create a form, and replace YOUR_FORM_ID below:
            <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
            Then wrap the fields and button in that form tag.
          -->
          <div class="form-section">
            <div class="form-field">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" autocomplete="name" />
            </div>
            <div class="form-field">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" autocomplete="email" />
            </div>
            <div class="form-field">
              <label for="message">Message</label>
              <textarea id="message" name="message" rows="3"></textarea>
            </div>
            <button class="contact-btn" type="button" onclick="handleContact()">Contact Me</button>
          </div>

          <div class="contact-info-section">
            <div class="info-block">
              <span class="info-label">Contact</span>
              <!-- Replace with your email -->
              <span class="info-value">bennett.bcg@gmail.com</span>
            </div>
            <div class="info-block">
              <span class="info-label"></span>
              <span class="info-value"></span>
            </div>
            <div class="social-icons">
              <!-- Replace hrefs with your actual profile URLs -->
              <a class="social-icon" href="https://linkedin.com" target="_blank" aria-label="LinkedIn">In</a>
              <a class="social-icon" href="https://instagram.com" target="_blank" aria-label="Instagram">I</a>
              <a class="social-icon" href="https://youtube.com" target="_blank" aria-label="YouTube">Y</a>
            </div>
          </div>

        </div>
      </div>
    </div>
  </main>

  <script>
    function handleContact() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const message = document.getElementById('message').value.trim();
      if (!name || !email || !message) {
        alert('Please fill out all fields.');
        return;
      }
      // Replace this with your form submission logic or Formspree integration
      window.location.href = 'mailto:bennett.bcg@gmail.com'
        + '?subject=Message from ' + encodeURIComponent(name)
        + '&body=' + encodeURIComponent(message)
        + '%0A%0AReply to: ' + encodeURIComponent(email);
    }
  </script>

</body>
</html>
